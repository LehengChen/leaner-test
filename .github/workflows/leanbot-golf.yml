name: leanbot-golf

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  golf:
    runs-on: ubuntu-latest
    steps:
      - name: Handle /leanbot golf command
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LEANBOT_TOKEN }}
          script: |
            const body = (context.payload.comment?.body || '').trim()
            const isPR = Boolean(context.payload.issue?.pull_request)
            const isOwner = context.actor === 'LehengChen'

            core.info(`actor=${context.actor}`)
            core.info(`body=${body}`)
            core.info(`isPR=${isPR}`)

            if (!isPR) {
              core.info('Not a PR comment, exiting.')
              return
            }

            if (body !== '/leanbot golf') {
              core.info('Not the target command, exiting.')
              return
            }

            if (!isOwner) {
              core.info('Actor is not allowed for phase 1/2/3, exiting.')
              return
            }

            const issue_number = context.payload.issue.number
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
            })

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
              per_page: 100,
            })

            const headRef = pr.head.ref
            const headSha = pr.head.sha
            const baseRef = pr.base.ref
            const changedFiles = pr.changed_files
            const fileNames = files.map(f => f.filename)
            const leanFiles = fileNames.filter(name => name.endsWith('.lean'))

            core.info(`headRef=${headRef}`)
            core.info(`headSha=${headSha}`)
            core.info(`baseRef=${baseRef}`)
            core.info(`changedFiles=${changedFiles}`)
            core.info(`fileNames=${JSON.stringify(fileNames)}`)
            core.info(`leanFiles=${JSON.stringify(leanFiles)}`)

            const changedList = fileNames.length > 0
              ? fileNames.map(name => `  - ${name}`).join('\n')
              : '  - (none)'

            const leanList = leanFiles.length > 0
              ? leanFiles.map(name => `  - ${name}`).join('\n')
              : '  - (none)'

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '✅ leanbot received `/leanbot golf`.',
                '',
                `- PR: #${issue_number}`,
                `- Triggered by: @${context.actor}`,
                `- Base branch: \`${baseRef}\``,
                `- Head branch: \`${headRef}\``,
                `- Head SHA: \`${headSha}\``,
                `- Changed files count: ${changedFiles}`,
                '',
                '**Changed files**',
                changedList,
                '',
                '**Lean targets**',
                leanList,
                '',
                leanFiles.length > 0
                  ? '- Phase 3 status: Lean target file detection is working.'
                  : '- Phase 3 status: No `.lean` files found in this PR.',
                '- Next step: read changed Lean file contents or patch hunks inside a Codex + Lean-capable environment.'
              ].join('\n')
            })
