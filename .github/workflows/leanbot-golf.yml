name: leanbot-golf

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  golf:
    runs-on: ubuntu-latest
    steps:
      - name: Collect command and PR metadata
        id: meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LEANBOT_TOKEN }}
          script: |
            const body = (context.payload.comment?.body || '').trim()
            const isPR = Boolean(context.payload.issue?.pull_request)
            const isOwner = context.actor === 'LehengChen'

            core.setOutput('should_run', 'false')
            core.setOutput('issue_number', String(context.payload.issue?.number || ''))

            if (!isPR) return core.info('Not a PR comment, exiting.')
            if (body !== '/leanbot golf') return core.info('Not the target command, exiting.')
            if (!isOwner) return core.info('Actor is not allowed for current phases, exiting.')

            const issue_number = context.payload.issue.number
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
            })

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
              per_page: 100,
            })

            const fileNames = files.map(f => f.filename)
            const leanFiles = files.filter(f => f.filename.endsWith('.lean'))

            core.setOutput('should_run', 'true')
            core.setOutput('issue_number', String(issue_number))
            core.setOutput('base_ref', pr.base.ref)
            core.setOutput('head_ref', pr.head.ref)
            core.setOutput('head_sha', pr.head.sha)
            core.setOutput('changed_files', String(pr.changed_files))
            core.setOutput('changed_list', fileNames.join('\n'))
            core.setOutput('lean_list', leanFiles.map(f => f.filename).join('\n'))

      - name: Checkout PR head
        if: steps.meta.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.meta.outputs.head_sha }}

      - name: Inspect checked-out workspace
        if: steps.meta.outputs.should_run == 'true'
        id: inspect
        shell: bash
        run: |
          {
            echo 'repo_root<<EOF'
            pwd
            echo 'EOF'
            echo 'top_files<<EOF'
            find . -maxdepth 2 -type f | sort
            echo 'EOF'
            if [ -f README.md ]; then echo 'readme_present=true'; else echo 'readme_present=false'; fi
            if [ -f Lean/Example.lean ]; then echo 'lean_example_present=true'; else echo 'lean_example_present=false'; fi
            if [ -f lean-toolchain ]; then
              echo 'lean_toolchain_present=true'
              echo 'lean_toolchain_value<<EOF'
              cat lean-toolchain
              echo 'EOF'
            else
              echo 'lean_toolchain_present=false'
              echo 'lean_toolchain_value<<EOF'
              echo '(missing)'
              echo 'EOF'
            fi
            if [ -f lakefile.toml ] || [ -f lakefile.lean ]; then
              echo 'lake_project_present=true'
            else
              echo 'lake_project_present=false'
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Install Lean from lean-toolchain
        if: steps.meta.outputs.should_run == 'true' && steps.inspect.outputs.lean_toolchain_present == 'true'
        id: leanenv
        shell: bash
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          export PATH="$HOME/.elan/bin:$PATH"
          TOOLCHAIN=$(cat lean-toolchain)
          elan toolchain install "$TOOLCHAIN"
          elan default "$TOOLCHAIN"
          {
            echo 'lean_version<<EOF'
            lean --version
            echo 'EOF'
            echo 'lake_version<<EOF'
            lake --version
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run minimal project-aware Lean commands
        if: steps.meta.outputs.should_run == 'true' && steps.inspect.outputs.lake_project_present == 'true'
        id: projectcheck
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          lake build
          {
            echo 'lake_build_status=success'
            echo 'lake_build_output<<EOF'
            echo 'lake build completed successfully'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Reply with Phase 6B status
        if: steps.meta.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          CHANGED_LIST: ${{ steps.meta.outputs.changed_list }}
          LEAN_LIST: ${{ steps.meta.outputs.lean_list }}
          TOP_FILES: ${{ steps.inspect.outputs.top_files }}
          LEAN_TOOLCHAIN_VALUE: ${{ steps.inspect.outputs.lean_toolchain_value }}
          LEAN_VERSION: ${{ steps.leanenv.outputs.lean_version }}
          LAKE_VERSION: ${{ steps.leanenv.outputs.lake_version }}
          LEAN_TOOLCHAIN_PRESENT: ${{ steps.inspect.outputs.lean_toolchain_present }}
          LAKE_PROJECT_PRESENT: ${{ steps.inspect.outputs.lake_project_present }}
          LAKE_BUILD_STATUS: ${{ steps.projectcheck.outputs.lake_build_status }}
          LAKE_BUILD_OUTPUT: ${{ steps.projectcheck.outputs.lake_build_output }}
        with:
          github-token: ${{ secrets.LEANBOT_TOKEN }}
          script: |
            const issue_number = Number(${{ steps.meta.outputs.issue_number }})
            const changedRaw = (process.env.CHANGED_LIST || '').trim()
            const leanRaw = (process.env.LEAN_LIST || '').trim()
            const topRaw = (process.env.TOP_FILES || '').trim()
            const changedList = changedRaw ? changedRaw.split('\n').map(x => `  - ${x}`).join('\n') : '  - (none)'
            const leanList = leanRaw ? leanRaw.split('\n').map(x => `  - ${x}`).join('\n') : '  - (none)'
            const topFiles = topRaw ? topRaw.split('\n').slice(0,12).map(x => `  - ${x}`).join('\n') : '  - (none)'
            const leanToolchainPresent = process.env.LEAN_TOOLCHAIN_PRESENT === 'true'
            const lakeProjectPresent = process.env.LAKE_PROJECT_PRESENT === 'true'
            const leanVersion = (process.env.LEAN_VERSION || '').trim() || '(not run)'
            const lakeVersion = (process.env.LAKE_VERSION || '').trim() || '(not run)'
            const leanToolchainValue = (process.env.LEAN_TOOLCHAIN_VALUE || '').trim() || '(missing)'
            const lakeBuildStatus = (process.env.LAKE_BUILD_STATUS || '').trim() || '(not run)'
            const lakeBuildOutput = (process.env.LAKE_BUILD_OUTPUT || '').trim() || '(not run)'

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '✅ leanbot received `/leanbot golf`.',
                '',
                `- PR: #${issue_number}`,
                `- Triggered by: @${context.actor}`,
                `- Base branch: \`${{ steps.meta.outputs.base_ref }}\``,
                `- Head branch: \`${{ steps.meta.outputs.head_ref }}\``,
                `- Head SHA: \`${{ steps.meta.outputs.head_sha }}\``,
                `- Changed files count: ${{ steps.meta.outputs.changed_files }}`,
                '',
                '**Changed files**',
                changedList,
                '',
                '**Lean targets**',
                leanList,
                '',
                '**Checked-out workspace**',
                `- repo root: \`${{ steps.inspect.outputs.repo_root }}\``,
                `- README present: ${{ steps.inspect.outputs.readme_present }}`,
                `- Lean/Example.lean present: ${{ steps.inspect.outputs.lean_example_present }}`,
                `- lean-toolchain present: ${leanToolchainPresent}`,
                `- lean-toolchain value: \`${leanToolchainValue}\``,
                `- lake project present: ${lakeProjectPresent}`,
                '**Top files in checkout**',
                topFiles,
                '',
                '**Lean environment**',
                `- lean --version: \`${leanVersion.replace(/\n/g, ' | ')}\``,
                `- lake --version: \`${lakeVersion.replace(/\n/g, ' | ')}\``,
                '',
                '**Project-aware Lean commands**',
                `- lake build status: \`${lakeBuildStatus}\``,
                `- lake build output: \`${lakeBuildOutput.replace(/\n/g, ' | ')}\``,
                '',
                lakeProjectPresent
                  ? '- Phase 6B status: minimal project-aware Lean command execution is working.'
                  : '- Phase 6B status: no Lake project found, so project-aware Lean commands were skipped.',
                '- Next step: add `OPENAI_API_KEY` and prepare the first minimal Codex call on top of this Lean-capable workspace.'
              ].join('\n')
            })
