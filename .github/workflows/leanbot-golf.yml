name: leanbot-golf

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  golf:
    runs-on: ubuntu-latest
    steps:
      - name: Collect command and PR metadata
        id: meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LEANBOT_TOKEN }}
          script: |
            const body = (context.payload.comment?.body || '').trim()
            const isPR = Boolean(context.payload.issue?.pull_request)
            const isOwner = context.actor === 'LehengChen'

            core.setOutput('should_run', 'false')
            core.setOutput('issue_number', String(context.payload.issue?.number || ''))

            if (!isPR) {
              core.info('Not a PR comment, exiting.')
              return
            }
            if (body !== '/leanbot golf') {
              core.info('Not the target command, exiting.')
              return
            }
            if (!isOwner) {
              core.info('Actor is not allowed for phase 1/2/3/4/5, exiting.')
              return
            }

            const issue_number = context.payload.issue.number
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
            })

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
              per_page: 100,
            })

            const fileNames = files.map(f => f.filename)
            const leanFiles = files.filter(f => f.filename.endsWith('.lean'))

            core.setOutput('should_run', 'true')
            core.setOutput('issue_number', String(issue_number))
            core.setOutput('base_ref', pr.base.ref)
            core.setOutput('head_ref', pr.head.ref)
            core.setOutput('head_sha', pr.head.sha)
            core.setOutput('changed_files', String(pr.changed_files))
            core.setOutput('changed_list', fileNames.join('\n'))
            core.setOutput('lean_list', leanFiles.map(f => f.filename).join('\n'))

      - name: Checkout PR head
        if: steps.meta.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ steps.meta.outputs.head_sha }}

      - name: Inspect checked-out workspace
        if: steps.meta.outputs.should_run == 'true'
        id: inspect
        shell: bash
        run: |
          {
            echo 'repo_root<<EOF'
            pwd
            echo 'EOF'
            echo 'top_files<<EOF'
            find . -maxdepth 2 -type f | sort
            echo 'EOF'
            if [ -f README.md ]; then
              echo 'readme_present=true'
            else
              echo 'readme_present=false'
            fi
            if [ -f Lean/Example.lean ]; then
              echo 'lean_example_present=true'
            else
              echo 'lean_example_present=false'
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Reply with Phase 5 status
        if: steps.meta.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LEANBOT_TOKEN }}
          script: |
            const issue_number = Number(${{ steps.meta.outputs.issue_number }})
            const changedListRaw = `${{ steps.meta.outputs.changed_list }}`.trim()
            const leanListRaw = `${{ steps.meta.outputs.lean_list }}`.trim()
            const changedList = changedListRaw
              ? changedListRaw.split('\n').map(x => `  - ${x}`).join('\n')
              : '  - (none)'
            const leanList = leanListRaw
              ? leanListRaw.split('\n').map(x => `  - ${x}`).join('\n')
              : '  - (none)'
            const topFiles = `${{ steps.inspect.outputs.top_files }}`.trim()
              .split('\n')
              .slice(0, 12)
              .map(x => `  - ${x}`)
              .join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '✅ leanbot received `/leanbot golf`.',
                '',
                `- PR: #${issue_number}`,
                `- Triggered by: @${context.actor}`,
                `- Base branch: \`${{ steps.meta.outputs.base_ref }}\``,
                `- Head branch: \`${{ steps.meta.outputs.head_ref }}\``,
                `- Head SHA: \`${{ steps.meta.outputs.head_sha }}\``,
                `- Changed files count: ${{ steps.meta.outputs.changed_files }}`,
                '',
                '**Changed files**',
                changedList,
                '',
                '**Lean targets**',
                leanList,
                '',
                '**Checked-out workspace**',
                `- repo root: \`${{ steps.inspect.outputs.repo_root }}\``,
                `- README present: ${{ steps.inspect.outputs.readme_present }}`,
                `- Lean/Example.lean present: ${{ steps.inspect.outputs.lean_example_present }}`,
                '**Top files in checkout**',
                topFiles || '  - (none)',
                '',
                '- Phase 5 status: checkout of PR head is working.',
                '- Next step: run Codex + Lean-capable analysis against the checked-out PR workspace.'
              ].join('\n')
            })
